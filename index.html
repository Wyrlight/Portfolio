<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ==========================================================
         BASIC SEO
    =========================================================== -->

    <title>Wyrlight Portfolio | Original Minimalist Vector Graphics & Graphic Artwork</title>

    <meta name="description"
          content="Explore original minimalist vector graphics and graphic artwork by Wyrlight. A curated portfolio featuring handcrafted vector illustrations, Nordic-inspired design and refined artwork prepared for print-on-demand.">

    <meta name="author" content="Wyrlight">
    <meta name="robots" content="index,follow">
    <meta name="theme-color" content="#F5F5F5">

    <!-- ==========================================================
         FAVICON
    =========================================================== -->

    <link rel="icon" href="assets/img/favicon/favicon.png" sizes="any">
    <link rel="apple-touch-icon" href="assets/img/favicon/favicon.png">

    <!-- ==========================================================
         CSS
    =========================================================== -->

    <link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

<hr class="full-separator">

<div class="page-wrapper">

<!-- ==========================================================
     HEADER
========================================================== -->

<header>

    <div class="header-inner">

        <div class="logo">

            <img
                src="assets/img/logo/wyrlight-logo.svg"
                alt="Wyrlight logo"
                width="1024"
                height="1024">

        </div>

        <!-- Reserved for future internal navigation -->

    </div>

</header>

<hr class="full-separator">

<!-- ==========================================================
     MAIN
========================================================== -->

<main>

    <h1 class="page-title">
        Wyrlight Portfolio
    </h1>

    <div class="intro">
        Explore a curated collection of original minimalist vector graphics and graphic artwork inspired by Nordic design principles.
    </div>

    <div class="hero">

        <img
            src="assets/img/hero/hero-sailboat-illustration.svg"
            alt="Minimalist sailboat illustration representing the Wyrlight portfolio"
            width="280"
            height="280">

    </div>

</main>

<hr class="full-separator">

<!-- ==========================================================
     VECTOR GRAPHICS
========================================================== -->

<section>

    <h2 class="section-title">
        Vector Graphics
    </h2>

    <h3 class="collection-title">
        Fishing
    </h3>

    <div class="gallery-grid">

        <img
            src="assets/img/vector/minimalist-fishing-boat-vector.svg"
            alt="Original minimalist fishing boat vector graphic created in Inkscape by Wyrlight"
            loading="lazy"
            decoding="async">

        <img
            src="assets/img/vector/minimalist-trolling-reel-vector.svg"
            alt="Original minimalist trolling reel vector graphic created in Inkscape by Wyrlight"
            loading="lazy"
            decoding="async">

        <img
            src="assets/img/vector/minimalist-tuna-vector.svg"
            alt="Original minimalist tuna vector graphic created in Inkscape by Wyrlight"
            loading="lazy"
            decoding="async">

            src="assets/img/vector/minimalist-ocean-wave-vector.svg"
            alt="Original minimalist ocean wave vector graphic created in Inkscape by Wyrlight"
            loading="lazy"
            decoding="async">

    </div>

    <h3 class="collection-title">
        Camping
    </h3>

    <div class="gallery-grid">

        <img
            src="assets/img/vector/minimalist-camping-tent-vector.svg"
            alt="Original minimalist camping tent vector graphic created in Inkscape by Wyrlight"
            loading="lazy"
            decoding="async">

        <img
            src="assets/img/vector/minimalist-campfire-scene-vector.svg"
            alt="Original minimalist campfire scene vector graphic created in Inkscape by Wyrlight"
            loading="lazy"
            decoding="async">

        <img
            src="assets/img/vector/minimalist-canoe-vector.svg"
            alt="Original minimalist canoe vector graphic created in Inkscape by Wyrlight"
            loading="lazy"
            decoding="async">

        <img
            src="assets/img/vector/minimalist-small-lake-vector.svg"
            alt="Original minimalist small lake vector graphic created in Inkscape by Wyrlight"
            loading="lazy"
            decoding="async">

    </div>

</section>

<hr class="full-separator">

<!-- ==========================================================
     GRAPHIC ARTWORK
========================================================== -->

<section>

    <h2 class="section-title">
        Graphic Artwork
    </h2>

    <div class="gallery-grid">

        <img
            src="assets/img/graphic/minimalist-zen-cairn.webp"
            alt="Minimalist zen cairn graphic artwork refined for print-on-demand by Wyrlight"
            loading="lazy"
            decoding="async">

        <img
            src="assets/img/graphic/minimalist-retro-bear.webp"

    </div>

</section>
